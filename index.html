  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

) format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Roboto Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f49cdb86-3479-416c-9a2a-1490a4a6c353\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Roboto Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"72a14d94-577c-4ba7-94d1-540bb215a66a\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Roboto Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e0671fc8-1843-4ef2-bf18-012f87fb8ab2\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Roboto Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b5468566-ee1f-484c-b5bd-884b2a7825bf\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Roboto Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"35e0490d-ae0e-448e-bc50-eb0ecab0a812\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- BRAND COLORS ---------- */\n  --bj-red:            #CB0F13;   /* Bagjump Red · PANTONE 485 C */\n  --bj-red-hover:      #B00D11;   /* darkened 8% for hover */\n  --bj-red-pressed:    #8F0A0E;   /* darkened ~15% for press */\n  --bj-red-tint:       #FCE7E7;   /* subtle red surface */\n\n  --bj-blue:           #003952;   /* Bagjump Dark Blue · PANTONE 3035 C */\n  --bj-blue-hover:     #002E44;\n  --bj-blue-pressed:   #002233;\n  --bj-blue-tint:      #E6EBEE;\n\n  --bj-black:          #000000;\n  --bj-white:          #FFFFFF;\n\n  /* ---------- NEUTRALS (functional, derived from blue) ---------- */\n  --bj-ink:            #0A1F2B;   /* near-black body text on light */\n  --bj-ink-soft:       #2B4452;   /* secondary text */\n  --bj-ink-muted:      #5A6D78;   /* tertiary / captions */\n  --bj-line:           #D6DCE0;   /* hairline dividers */\n  --bj-line-soft:      #ECEFF1;\n  --bj-surface:        #FFFFFF;\n  --bj-surface-alt:    #F5F7F8;   /* subtle panel bg */\n  --bj-surface-dark:   var(--bj-blue);\n\n  /* ---------- SEMANTIC FG/BG ---------- */\n  --fg-1:              var(--bj-blue);     /* primary text */\n  --fg-2:              var(--bj-ink-soft); /* secondary text */\n  --fg-3:              var(--bj-ink-muted);/* tertiary text */\n  --fg-accent:         var(--bj-red);      /* accent text */\n  --fg-on-dark:        var(--bj-white);\n  --fg-on-red:         var(--bj-white);\n\n  --bg-1:              var(--bj-white);\n  --bg-2:              var(--bj-surface-alt);\n  --bg-dark:           var(--bj-blue);\n  --bg-accent:         var(--bj-red);\n\n  /* ---------- TYPE ---------- */\n  --font-sans:         'Roboto', Arial, 'Helvetica Neue', sans-serif;\n  --font-condensed:    'Roboto Condensed', 'Arial Narrow', Arial, sans-serif;\n\n  --fw-light:    300;\n  --fw-regular:  400;\n  --fw-medium:   500;\n  --fw-bold:     700;\n  --fw-black:    900;\n\n  /* Type scale — modular, derived from 16px base.\n     Headings ≥24pt use Bold (700) or Black (900) per brand rules. */\n  --fs-display:  clamp(56px, 7vw, 88px);  /* hero display */\n  --fs-h1:       clamp(40px, 5vw, 56px);\n  --fs-h2:       clamp(32px, 3.6vw, 40px);\n  --fs-h3:       28px;\n  --fs-h4:       22px;\n  --fs-h5:       18px;\n  --fs-body:     16px;\n  --fs-small:    14px;\n  --fs-caption:  12px;\n  --fs-eyebrow:  13px; /* uppercase condensed label */\n\n  --lh-tight:    1.05;\n  --lh-snug:     1.2;\n  --lh-normal:   1.45;\n  --lh-relaxed:  1.6;\n\n  --ls-display:  -0.02em;\n  --ls-heading:  -0.01em;\n  --ls-eyebrow:  0.14em;\n\n  /* ---------- SPACING (4px baseline) ---------- */\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   24px;\n  --space-6:   32px;\n  --space-7:   48px;\n  --space-8:   64px;\n  --space-9:   96px;\n  --space-10: 128px;\n\n  /* ---------- RADII ---------- */\n  /* Bagjump leans geometric + industrial — radii are small. */\n  --radius-0:   0px;\n  --radius-1:   2px;\n  --radius-2:   4px;   /* default for inputs/buttons */\n  --radius-3:   8px;   /* cards */\n  --radius-pill: 999px;\n\n  /* ---------- SHADOWS (restrained, never dreamy) ---------- */\n  --shadow-1:  0 1px 2px rgba(0, 57, 82, 0.08);\n  --shadow-2:  0 4px 12px rgba(0, 57, 82, 0.10);\n  --shadow-3:  0 12px 32px rgba(0, 57, 82, 0.14);\n  --shadow-red: 0 6px 20px rgba(203, 15, 19, 0.28);\n\n  /* ---------- BORDERS ---------- */\n  --border-thin:  1px solid var(--bj-line);\n  --border-strong: 2px solid var(--bj-blue);\n  --border-accent: 2px solid var(--bj-red);\n\n  /* ---------- MOTION ---------- */\n  --ease-out:       cubic-bezier(0.22, 1, 0.36, 1);\n  --ease-in-out:    cubic-bezier(0.65, 0, 0.35, 1);\n  --dur-fast:       140ms;\n  --dur-med:        240ms;\n  --dur-slow:       420ms;\n}\n\n/* ============================================================\n   SEMANTIC ELEMENT STYLES\n   ============================================================ */\n\nhtml {\n  font-family: var(--font-sans);\n  color: var(--fg-1);\n  background: var(--bg-1);\n  font-size: var(--fs-body);\n  line-height: var(--lh-normal);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-sans);\n  color: var(--fg-1);\n  margin: 0;\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-heading);\n}\n\nh1 { font-size: var(--fs-h1); font-weight: var(--fw-black); letter-spacing: var(--ls-display); }\nh2 { font-size: var(--fs-h2); font-weight: var(--fw-bold); }\nh3 { font-size: var(--fs-h3); font-weight: var(--fw-bold); }\nh4 { font-size: var(--fs-h4); font-weight: var(--fw-bold); }\nh5 { font-size: var(--fs-h5); font-weight: var(--fw-medium); }\n\np  { margin: 0; font-size: var(--fs-body); line-height: var(--lh-relaxed); color: var(--fg-2); }\n\nsmall, .caption { font-size: var(--fs-caption); color: var(--fg-3); }\n\n.eyebrow {\n  font-family: var(--font-condensed);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-eyebrow);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--bj-red);\n}\n\n.display {\n  font-weight: var(--fw-black);\n  font-size: var(--fs-display);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-display);\n  text-transform: uppercase;\n}\n\n.condensed {\n  font-family: var(--font-condensed);\n}\n\ncode, pre, kbd, samp {\n  font-family: 'Roboto Mono', ui-monospace, Menlo, Consolas, monospace;\n  font-size: 0.92em;\n}\n\na {\n  color: var(--bj-red);\n  text-decoration: none;\n  border-bottom: 1px solid currentColor;\n  transition: color var(--dur-fast) var(--ease-out);\n}\na:hover { color: var(--bj-red-hover); }\n\nhr { border: 0; border-top: var(--border-thin); margin: var(--space-6) 0; }\n\n/* ---------- UTILITY ---------- */\n.on-dark        { color: var(--fg-on-dark); }\n.on-dark p      { color: rgba(255,255,255,0.85); }\n.on-dark .eyebrow { color: var(--bj-red); }\n\n.bg-red   { background: var(--bg-accent); color: var(--fg-on-red); }\n.bg-blue  { background: var(--bg-dark);   color: var(--fg-on-dark); }\n.bg-white { background: var(--bg-1);      color: var(--fg-1); }\n.bg-tint  { background: var(--bg-2);      color: var(--fg-1); }\n<\u002Fstyle>\n<style>/* BAGJUMP Techtextil Spec Sheet site — mobile-first */\n\n* { box-sizing: border-box; }\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  background: var(--bg-1);\n  color: var(--fg-1);\n  -webkit-tap-highlight-color: transparent;\n  overflow-x: hidden;\n}\n\n/* ============ DARK MODE ============ */\nbody.dark {\n  --bg-1: #0A1F2B;\n  --bg-2: #0E2A3A;\n  --fg-1: #FFFFFF;\n  --fg-2: #B8C4CC;\n  --fg-3: #7A8C96;\n  --bj-line: rgba(255,255,255,0.12);\n  --bj-line-soft: rgba(255,255,255,0.06);\n  --bj-surface: #0E2A3A;\n  --bj-surface-alt: #112F40;\n  --bj-blue-tint: #0E2A3A;\n  background: var(--bg-1);\n  color: var(--fg-1);\n}\nbody.dark h1, body.dark h2, body.dark h3, body.dark h4, body.dark h5 { color: #FFFFFF; }\n\n/* ============ SHELL ============ */\n.shell {\n  max-width: 480px;\n  margin: 0 auto;\n  min-height: 100vh;\n  background: var(--bg-1);\n  position: relative;\n}\n\n/* ============ TOP BAR ============ */\n.topbar {\n  position: sticky; top: 0; z-index: 40;\n  background: var(--bj-blue);\n  color: #fff;\n  padding: 14px 20px;\n  display: flex; align-items: center; justify-content: space-between;\n  border-bottom: 3px solid var(--bj-red);\n}\n.topbar .brand { display: flex; align-items: center; gap: 10px; }\n.topbar .brand img { height: 22px; display: block; }\n.topbar .event {\n  font-family: var(--font-condensed);\n  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: rgba(255,255,255,0.7);\n}\n.topbar .event strong { color: #fff; }\n.back-btn {\n  display: inline-flex; align-items: center; gap: 6px;\n  color: #fff; text-decoration: none; border: 0; background: transparent;\n  font-family: var(--font-condensed); font-weight: 700; font-size: 12px;\n  letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;\n  padding: 6px 0;\n}\n.back-btn:hover { color: #fff; }\n.back-btn svg { width: 16px; height: 16px; }\n\n/* ============ HERO ============ */\n.hero {\n  position: relative;\n  background: var(--bj-blue);\n  color: #fff;\n  padding: 36px 20px 96px;\n  overflow: hidden;\n}\n.hero::before {\n  content: \"\"; position: absolute; right: -40px; top: -40px;\n  width: 220px; height: 220px; background: var(--bj-red);\n  transform: rotate(15deg);\n  z-index: 0;\n}\n.hero::after {\n  content: \"\"; position: absolute; left: -30px; bottom: -60px;\n  width: 140px; height: 140px; background: var(--bj-red);\n  opacity: 0.18;\n  z-index: 0;\n}\n.hero > * { position: relative; z-index: 1; }\n.hero .eyebrow { color: #fff; opacity: 0.9; }\n.hero h1 {\n  font-size: clamp(40px, 11vw, 56px);\n  font-weight: 900; line-height: 0.95;\n  letter-spacing: -0.03em;\n  text-transform: uppercase;\n  margin: 12px 0 8px;\n  color: #fff;\n}\n.hero h1 .accent { color: var(--bj-red); }\nbody.dark .hero h1 .accent { color: #FF3C40; }\n.hero .sub {\n  font-size: 15px; line-height: 1.5;\n  color: rgba(255,255,255,0.82);\n  max-width: 36ch;\n}\n.hero-meta {\n  display: flex; gap: 12px; margin-top: 20px;\n  font-family: var(--font-condensed);\n  font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;\n  color: rgba(255,255,255,0.75);\n}\n.hero-meta span { display: inline-flex; align-items: center; gap: 6px; }\n.hero-meta .dot { width: 6px; height: 6px; background: var(--bj-red); display: inline-block; }\n\n/* ============ CALLOUT CARD (over hero) ============ */\n.callout {\n  margin: -72px 20px 24px;\n  background: var(--bj-surface);\n  border: 2px solid var(--bj-blue);\n  padding: 20px;\n  position: relative;\n  z-index: 5;\n  box-shadow: var(--shadow-2);\n}\nbody.dark .callout { background: var(--bj-surface-alt); border-color: var(--bj-red); }\n.callout .eyebrow { margin-bottom: 6px; }\n.callout h3 {\n  font-size: 18px; line-height: 1.25; font-weight: 700;\n  margin: 0 0 8px;\n  color: var(--fg-1);\n}\n.callout p { font-size: 14px; color: var(--fg-2); margin: 0; }\n.callout .steps {\n  margin-top: 14px; padding-top: 14px;\n  border-top: 1px solid var(--bj-line);\n  display: grid; gap: 10px;\n}\n.callout .step {\n  display: flex; gap: 12px; align-items: flex-start;\n  font-size: 13px; line-height: 1.4; color: var(--fg-2);\n}\n.callout .step-num {\n  flex: 0 0 22px; height: 22px; background: var(--bj-red); color: #fff;\n  font-family: var(--font-condensed); font-weight: 700; font-size: 12px;\n  display: inline-flex; align-items: center; justify-content: center;\n}\n.callout .step strong { color: var(--fg-1); }\n\n/* ============ SECTION HEADS ============ */\n.section-head {\n  padding: 24px 20px 12px;\n  display: flex; align-items: baseline; justify-content: space-between;\n}\n.section-head h2 {\n  font-size: 22px; font-weight: 900;\n  text-transform: uppercase;\n  letter-spacing: -0.01em;\n  margin: 0;\n}\n.section-head .count {\n  font-family: var(--font-condensed);\n  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--fg-3);\n}\n\n/* ============ MATERIAL LIST ============ */\n.material-list { padding: 0 20px 40px; display: grid; gap: 12px; }\n.material-card {\n  display: grid;\n  grid-template-columns: 72px 1fr auto;\n  gap: 14px;\n  align-items: center;\n  background: var(--bj-surface);\n  border: 1px solid var(--bj-line);\n  padding: 14px;\n  cursor: pointer;\n  text-decoration: none;\n  color: var(--fg-1);\n  transition: transform var(--dur-fast) var(--ease-out),\n              box-shadow var(--dur-fast) var(--ease-out),\n              border-color var(--dur-fast) var(--ease-out);\n}\n.material-card:hover, .material-card:active {\n  transform: translateY(-2px);\n  box-shadow: var(--shadow-2);\n  border-color: var(--bj-blue);\n  color: var(--fg-1);\n}\nbody.dark .material-card { background: var(--bj-surface-alt); }\n\n.swatch {\n  width: 72px; height: 72px;\n  position: relative;\n  overflow: hidden;\n}\n.swatch::after {\n  content: \"\"; position: absolute; inset: 0;\n  border: 1px solid rgba(0,0,0,0.12);\n}\nbody.dark .swatch::after { border-color: rgba(255,255,255,0.12); }\n.swatch .num {\n  position: absolute; top: 4px; left: 6px;\n  font-family: var(--font-condensed); font-weight: 700;\n  font-size: 11px; letter-spacing: 0.1em;\n  color: rgba(255,255,255,0.9);\n  text-shadow: 0 1px 2px rgba(0,0,0,0.4);\n}\n\n.mc-body h3 {\n  font-size: 15px; font-weight: 700; line-height: 1.2;\n  margin: 0 0 4px;\n  color: var(--fg-1);\n}\n.mc-body .mc-cat {\n  font-family: var(--font-condensed);\n  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: var(--bj-red); font-weight: 700;\n  margin-bottom: 4px;\n}\n.mc-body .mc-spec {\n  font-size: 12px; color: var(--fg-2); line-height: 1.35;\n}\n.mc-arrow {\n  width: 32px; height: 32px;\n  background: var(--bj-blue);\n  color: #fff;\n  display: inline-flex; align-items: center; justify-content: center;\n}\n.mc-arrow svg { width: 16px; height: 16px; }\n\n/* ============ BOOTH CONTACT BAND ============ */\n.booth-band {\n  background: var(--bj-red);\n  color: #fff;\n  padding: 28px 20px;\n  position: relative;\n  overflow: hidden;\n}\n.booth-band::before {\n  content: \"\"; position: absolute; right: -40px; bottom: -40px;\n  width: 160px; height: 160px; background: rgba(255,255,255,0.08);\n  transform: rotate(20deg);\n}\n.booth-band .eyebrow { color: #fff; opacity: 0.9; }\n.booth-band h3 {\n  font-size: 24px; font-weight: 900; text-transform: uppercase;\n  letter-spacing: -0.01em; color: #fff;\n  margin: 6px 0 4px;\n}\n.booth-band .contact-row {\n  display: grid; gap: 4px; margin-top: 14px;\n  font-size: 14px; line-height: 1.5;\n  position: relative;\n}\n.booth-band .contact-row strong { display: block; font-weight: 700; }\n.booth-band a { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.4); }\n.booth-band a:hover { color: #fff; border-bottom-color: #fff; }\n\n/* ============ FOOTER ============ */\n.footer {\n  padding: 28px 20px 40px;\n  text-align: center;\n  font-family: var(--font-condensed);\n  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--fg-3);\n  border-top: 1px solid var(--bj-line);\n}\n\n/* ============ SPEC SHEET PAGE ============ */\n.spec-hero {\n  background: var(--bj-blue);\n  color: #fff;\n  padding: 20px 20px 28px;\n  position: relative;\n}\n.spec-hero .swatch-big {\n  width: 100%; aspect-ratio: 16/9;\n  margin-bottom: 16px;\n  position: relative;\n}\n.spec-hero .swatch-big::after {\n  content: \"\"; position: absolute; right: -12px; top: -12px;\n  width: 60px; height: 60px; background: var(--bj-red);\n  transform: rotate(15deg);\n  z-index: -1;\n}\n.spec-hero .num-big {\n  font-family: var(--font-condensed);\n  font-size: 14px; letter-spacing: 0.14em;\n  color: var(--bj-red); font-weight: 700;\n  margin-bottom: 6px;\n}\n.spec-hero h1 {\n  font-size: 28px; font-weight: 900; line-height: 1.05;\n  letter-spacing: -0.02em; text-transform: uppercase;\n  color: #fff;\n  margin: 0 0 10px;\n}\n.spec-hero .tagline {\n  font-size: 14px; line-height: 1.45;\n  color: rgba(255,255,255,0.85);\n}\n\n.spec-body { padding: 0 0 40px; }\n\n.spec-block { padding: 24px 20px; border-bottom: 1px solid var(--bj-line); }\n.spec-block:last-child { border-bottom: 0; }\n\n.spec-block h2 {\n  font-family: var(--font-condensed);\n  font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--bj-red); font-weight: 700;\n  margin: 0 0 12px;\n}\n.spec-block p { font-size: 14px; color: var(--fg-2); }\n\n/* target list */\n.targets { list-style: none; margin: 0; padding: 0; display: grid; gap: 8px; }\n.targets li {\n  font-size: 14px; line-height: 1.4;\n  display: grid; grid-template-columns: 18px 1fr; gap: 10px;\n  align-items: start;\n  color: var(--fg-1);\n}\n.targets li::before {\n  content: \"\"; width: 10px; height: 10px; background: var(--bj-red);\n  margin-top: 6px;\n}\n\n/* spec table */\n.spec-table {\n  display: grid;\n  grid-template-columns: minmax(110px, 40%) 1fr;\n  font-size: 14px;\n}\n.spec-table .k, .spec-table .v {\n  padding: 10px 0;\n  border-bottom: 1px solid var(--bj-line);\n}\n.spec-table .k {\n  font-family: var(--font-condensed); font-weight: 700;\n  text-transform: uppercase; letter-spacing: 0.08em; font-size: 12px;\n  color: var(--fg-2);\n  padding-right: 12px;\n}\n.spec-table .v {\n  color: var(--fg-1); font-weight: 500;\n  font-variant-numeric: tabular-nums;\n}\nbody.compact .spec-table { font-size: 13px; }\nbody.compact .spec-table .k, body.compact .spec-table .v { padding: 6px 0; }\n\n/* QR panel */\n.qr-panel {\n  background: var(--bj-surface-alt);\n  padding: 24px 20px;\n  border-top: 3px solid var(--bj-red);\n  border-bottom: 3px solid var(--bj-red);\n  display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: center;\n}\nbody.dark .qr-panel { background: #0E2A3A; }\n.qr-panel .qr-box {\n  width: 140px; height: 140px;\n  background: #fff; padding: 8px;\n  display: grid; place-items: center;\n  overflow: hidden;\n  flex-shrink: 0;\n}\n.qr-panel .qr-box > div {\n  width: 100% !important; height: 100% !important;\n  display: grid; place-items: center;\n}\n.qr-panel .qr-box canvas,\n.qr-panel .qr-box img,\n.qr-panel .qr-box svg {\n  width: 100% !important;\n  height: 100% !important;\n  max-width: 124px !important;\n  max-height: 124px !important;\n  display: block !important;\n  position: static !important;\n}\n.qr-panel .qr-box table { display: none !important; }\n.qr-panel h3 {\n  font-size: 16px; font-weight: 900; text-transform: uppercase;\n  letter-spacing: -0.01em;\n  margin: 0 0 6px;\n}\n.qr-panel p {\n  font-size: 12px; line-height: 1.4; color: var(--fg-2); margin: 0;\n}\n.qr-panel .filename {\n  font-family: 'Roboto Mono', monospace;\n  font-size: 10px; color: var(--fg-3);\n  margin-top: 8px; word-break: break-all;\n}\n\n/* download button */\n.download-cta {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 20px;\n  background: var(--bj-red);\n  color: #fff;\n  font-family: var(--font-sans);\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  font-size: 15px;\n  text-decoration: none;\n  margin: 0;\n  border: 0;\n  width: 100%;\n  cursor: pointer;\n  transition: background var(--dur-fast) var(--ease-out);\n}\n.download-cta:hover { background: var(--bj-red-hover); color: #fff; }\n.download-cta:active { background: var(--bj-red-pressed); }\n.download-cta svg { width: 22px; height: 22px; }\n\n/* compact adjustments */\nbody.compact .spec-block { padding: 16px 20px; }\nbody.compact .spec-block h2 { margin-bottom: 8px; }\nbody.compact .material-card { padding: 10px; }\nbody.compact .swatch { width: 60px; height: 60px; }\nbody.compact .mc-body h3 { font-size: 14px; }\n\n/* ============ TWEAKS PANEL ============ */\n.tweaks {\n  position: fixed; right: 16px; bottom: 16px; z-index: 100;\n  background: var(--bj-surface); border: 2px solid var(--bj-blue);\n  padding: 14px 16px; display: none;\n  box-shadow: var(--shadow-3);\n  min-width: 220px;\n}\n.tweaks.visible { display: block; }\nbody.dark .tweaks { background: var(--bj-surface-alt); border-color: var(--bj-red); }\n.tweaks h4 {\n  font-family: var(--font-condensed);\n  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--bj-red); font-weight: 700;\n  margin: 0 0 10px;\n}\n.tweak-row {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 16px; padding: 6px 0;\n  font-size: 13px;\n  color: var(--fg-1);\n}\n.tweak-row .label { font-weight: 500; }\n/* toggle switch */\n.switch {\n  position: relative; width: 38px; height: 22px;\n  background: var(--bj-line); cursor: pointer;\n  transition: background var(--dur-fast) var(--ease-out);\n  flex: 0 0 auto;\n}\n.switch::after {\n  content: \"\"; position: absolute; top: 2px; left: 2px;\n  width: 18px; height: 18px; background: #fff;\n  transition: transform var(--dur-fast) var(--ease-out);\n}\n.switch.on { background: var(--bj-red); }\n.switch.on::after { transform: translateX(16px); }\n\n/* entrance */\n@keyframes bjFade {\n  from { opacity: 0; transform: translateY(8px); }\n  to   { opacity: 1; transform: translateY(0); }\n}\n.material-card { animation: bjFade 0.3s var(--ease-out) both; }\n.material-card:nth-child(1) { animation-delay: 0.02s; }\n.material-card:nth-child(2) { animation-delay: 0.05s; }\n.material-card:nth-child(3) { animation-delay: 0.08s; }\n.material-card:nth-child(4) { animation-delay: 0.11s; }\n.material-card:nth-child(5) { animation-delay: 0.14s; }\n.material-card:nth-child(6) { animation-delay: 0.17s; }\n.material-card:nth-child(7) { animation-delay: 0.20s; }\n\n/* Desktop tweak: still render mobile-ish but with some breathing room */\n@media (min-width: 600px) {\n  .shell { box-shadow: 0 0 40px rgba(0,57,82,0.08); }\n}\n<\u002Fstyle>\n<link rel=\"icon\" href=\"b1bae4eb-8061-450e-8bea-fdec492de649\">\n\n<script src=\"32574f6d-b0d5-46e6-a0db-b415b814509a\"><\u002Fscript>\n<script src=\"9814e523-3191-4f99-a0ad-35de7f49706a\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<div class=\"shell\" id=\"app\"><\u002Fdiv>\n\n<!-- Tweaks panel -->\n<div class=\"tweaks\" id=\"tweaks\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"tweak-row\">\n    <span class=\"label\">Dark mode<\u002Fspan>\n    <div class=\"switch\" id=\"tw-dark\" role=\"switch\" tabindex=\"0\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <span class=\"label\">Compact density<\u002Fspan>\n    <div class=\"switch\" id=\"tw-compact\" role=\"switch\" tabindex=\"0\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ============ ROUTER ============\nconst app = document.getElementById('app');\n\nfunction navigate(hash) {\n  window.location.hash = hash;\n}\nwindow.addEventListener('hashchange', render);\nwindow.addEventListener('load', () => { render(); initTweaks(); });\n\nfunction render() {\n  const h = window.location.hash.replace(/^#\\/?/, '');\n  if (!h || h === '' || h === '/') {\n    renderHome();\n  } else if (h.startsWith('m/')) {\n    const id = h.slice(2);\n    const mat = window.MATERIALS.find(m => m.id === id);\n    if (mat) renderSpec(mat);\n    else { window.location.hash = ''; return; }\n  } else {\n    window.location.hash = '';\n  }\n  window.scrollTo(0, 0);\n}\n\n// ============ ICON HELPERS ============\nconst ICON_ARROW = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"square\"><path d=\"M5 12h14M13 6l6 6-6 6\"/><\u002Fsvg>';\nconst ICON_BACK  = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"square\"><path d=\"M19 12H5M11 18l-6-6 6-6\"/><\u002Fsvg>';\nconst ICON_DOWN  = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"square\" stroke-linejoin=\"miter\"><path d=\"M12 3v14M6 11l6 6 6-6M4 21h16\"/><\u002Fsvg>';\n\n// ============ HOME ============\nfunction renderHome() {\n  const n = window.MATERIALS.length;\n  app.innerHTML = `\n    <header class=\"topbar\">\n      <div class=\"brand\">\n        <img src=\"assets/logo-bagjump-white.svg\" alt=\"BAGJUMP\">\n      <\u002Fdiv>\n      <div class=\"event\"><strong>Techtextil<\u002Fstrong> · Frankfurt 2026<\u002Fdiv>\n    <\u002Fheader>\n\n    <section class=\"hero\">\n      <div class=\"eyebrow\">Sourcing Booklet · Hall 3.0<\u002Fdiv>\n      <h1>Material<br>Sourcing<br><span class=\"accent\">2026.<\u002Fspan><\u002Fh1>\n      <p class=\"sub\">Current spec requirements for BAGJUMP's commercial airbag production. Scan any material's QR to pull its datasheet.<\u002Fp>\n      <div class=\"hero-meta\">\n        <span><span class=\"dot\"><\u002Fspan>7 materials<\u002Fspan>\n        <span><span class=\"dot\"><\u002Fspan>Active sourcing<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div class=\"callout\">\n      <div class=\"eyebrow\">How this works<\u002Fdiv>\n      <h3>Browse. Scan. Send.<\u002Fh3>\n      <p>Each material has its own QR code. Scan the one relevant to you — the spec sheet will open on your phone, ready to save or share with your team.<\u002Fp>\n      <div class=\"steps\">\n        <div class=\"step\"><span class=\"step-num\">1<\u002Fspan><span>Tap a material to see our <strong>target specs<\u002Fstrong>.<\u002Fspan><\u002Fdiv>\n        <div class=\"step\"><span class=\"step-num\">2<\u002Fspan><span>Scan its <strong>QR code<\u002Fstrong> to download the PDF datasheet.<\u002Fspan><\u002Fdiv>\n        <div class=\"step\"><span class=\"step-num\">3<\u002Fspan><span>Send us your quote — contact below.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section-head\">\n      <h2>Materials<\u002Fh2>\n      <span class=\"count\">${String(n).padStart(2,'0')} items<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"material-list\">\n      ${window.MATERIALS.map(m => `\n        <a class=\"material-card\" href=\"#/m/${m.id}\">\n          <div class=\"swatch\" style=\"background:${m.swatch};\">\n            <span class=\"num\">${m.num}<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"mc-body\">\n            <div class=\"mc-cat\">${m.category}<\u002Fdiv>\n            <h3>${m.name}<\u002Fh3>\n            <div class=\"mc-spec\">${m.specs.weight}${m.specs.coating ? ' · ' + shortCoating(m.specs.coating) : ''}<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"mc-arrow\">${ICON_ARROW}<\u002Fspan>\n        <\u002Fa>\n      `).join('')}\n    <\u002Fdiv>\n\n    <section class=\"booth-band\">\n      <h3>Contact<\u002Fh3>\n      <div class=\"contact-row\">\n        <strong>Thomas Marx<\u002Fstrong>\n        <span>CEO · BAGJUMP Airbag Systems<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"contact-row\">\n        <a href=\"mailto:thomas.marx@bagjump.com\">thomas.marx@bagjump.com<\u002Fa>\n        <a href=\"tel:+436644040760\">+43 664 40 40 760<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer class=\"footer\">\n      BAGJUMP Airbag Systems · #landingonacloud · Techtextil 2026\n    <\u002Ffooter>\n  `;\n}\n\nfunction shortCoating(c) {\n  if (!c) return '';\n  return c.length > 40 ? c.slice(0, 38) + '…' : c;\n}\n\n// ============ SPEC SHEET ============\nfunction renderSpec(m) {\n  const s = m.specs;\n  const pdfName = pdfFilename(m);\n  app.innerHTML = `\n    <header class=\"topbar\">\n      <button class=\"back-btn\" onclick=\"window.location.hash='';\">${ICON_BACK} All Materials<\u002Fbutton>\n      <div class=\"event\"><strong>${m.num}<\u002Fstrong> / 07<\u002Fdiv>\n    <\u002Fheader>\n\n    <section class=\"spec-hero\">\n      <div class=\"swatch-big\" style=\"background:${m.swatch};\"><\u002Fdiv>\n      <div class=\"num-big\">MATERIAL ${m.num} · ${m.category.toUpperCase()}<\u002Fdiv>\n      <h1>${m.name}<\u002Fh1>\n      <p class=\"tagline\">${m.tagline}<\u002Fp>\n    <\u002Fsection>\n\n    <div class=\"qr-panel\">\n      <div class=\"qr-box\"><div id=\"qr-target\"><\u002Fdiv><\u002Fdiv>\n      <div>\n        <h3>Download Spec Sheet<\u002Fh3>\n        <p>Scan to open the PDF datasheet on your phone. Share internally, then send us your quote.<\u002Fp>\n        <div class=\"filename\">${pdfName}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <a class=\"download-cta\" href=\"${m.pdf}\" target=\"_blank\" rel=\"noopener\">\n      <span>Download PDF<\u002Fspan>\n      ${ICON_DOWN}\n    <\u002Fa>\n\n    <div class=\"spec-body\">\n\n      <div class=\"spec-block\">\n        <h2>Application<\u002Fh2>\n        <p>${m.application}<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"spec-block\">\n        <h2>Our Target Spec<\u002Fh2>\n        <ul class=\"targets\">\n          ${m.targets.map(t => `<li>${t}<\u002Fli>`).join('')}\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"spec-block\">\n        <h2>Technical Data<\u002Fh2>\n        <div class=\"spec-table\">\n          ${specRows(s)}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"spec-block\">\n        <h2>Quote Request<\u002Fh2>\n        <p>Send pricing, MOQ, lead time and certifications to <a href=\"mailto:thomas.marx@bagjump.com?subject=Techtextil%202026%20%E2%80%94%20${encodeURIComponent(m.name)}\">thomas.marx@bagjump.com<\u002Fa>. Reference material <strong>${m.num}<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <section class=\"booth-band\">\n      <div class=\"eyebrow\">Direct Contact<\u002Fdiv>\n      <h3>Thomas Marx<\u002Fh3>\n      <div class=\"contact-row\">\n        <a href=\"mailto:thomas.marx@bagjump.com\">thomas.marx@bagjump.com<\u002Fa>\n        <a href=\"tel:+436644040760\">+43 664 40 40 760<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer class=\"footer\">\n      BAGJUMP · Material ${m.num} / 07 · Techtextil 2026\n    <\u002Ffooter>\n  `;\n\n  // Render QR for this material's PDF (qrcodejs API)\n  const target = document.getElementById('qr-target');\n  if (target && window.QRCode) {\n    target.innerHTML = '';\n    new QRCode(target, {\n      text: m.pdf,\n      width: 124,\n      height: 124,\n      colorDark: '#003952',\n      colorLight: '#FFFFFF',\n      correctLevel: QRCode.CorrectLevel.M\n    });\n  }\n}\n\nconst SPEC_ORDER = [\n  ['weight', 'Weight'],\n  ['tensile', 'Tensile'],\n  ['tear', 'Tear'],\n  ['coating', 'Coating'],\n  ['yarn', 'Yarn / weave'],\n  ['denier', 'Denier'],\n  ['cord', 'Cord Ø'],\n  ['shear', 'Shear load'],\n  ['peel', 'Peel load'],\n  ['cycles', 'Cycle life'],\n  ['abrasion', 'Abrasion'],\n  ['adhesion', 'Coating adhesion'],\n  ['radiant', 'Radiant heat'],\n  ['flame', 'Flame retardancy'],\n  ['temp', 'Temperature'],\n  ['width', 'Width'],\n  ['color', 'Colors'],\n  ['moq', 'MOQ / lead time'],\n  ['origin', 'Origin']\n];\n\nfunction specRows(s) {\n  return SPEC_ORDER\n    .filter(([k]) => s[k])\n    .map(([k, label]) => `<div class=\"k\">${label}<\u002Fdiv><div class=\"v\">${s[k]}<\u002Fdiv>`)\n    .join('');\n}\n\nfunction pdfFilename(m) {\n  return `BAGJUMP_SpecSheet_${m.name.replace(/\\s+/g,'_').replace(/[^\\w\\-]/g,'')}.pdf`;\n}\n\n// ============ TWEAKS (density + dark mode) ============\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"dark\": false,\n  \"compact\": false\n}/*EDITMODE-END*/;\n\nlet tweakState = { ...TWEAK_DEFAULTS };\n\nfunction applyTweaks() {\n  document.body.classList.toggle('dark', !!tweakState.dark);\n  document.body.classList.toggle('compact', !!tweakState.compact);\n  document.querySelector('meta[name=\"theme-color\"]').setAttribute('content', tweakState.dark ? '#0A1F2B' : '#003952');\n  document.getElementById('tw-dark').classList.toggle('on', !!tweakState.dark);\n  document.getElementById('tw-compact').classList.toggle('on', !!tweakState.compact);\n}\n\nfunction initTweaks() {\n  applyTweaks();\n\n  // Tweaks host protocol\n  window.addEventListener('message', (e) => {\n    const d = e.data;\n    if (!d || typeof d !== 'object') return;\n    if (d.type === '__activate_edit_mode') {\n      document.getElementById('tweaks').classList.add('visible');\n    } else if (d.type === '__deactivate_edit_mode') {\n      document.getElementById('tweaks').classList.remove('visible');\n    }\n  });\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e) {}\n\n  function flip(key) {\n    tweakState[key] = !tweakState[key];\n    applyTweaks();\n    try {\n      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: tweakState[key] } }, '*');\n    } catch(e) {}\n  }\n  document.getElementById('tw-dark').addEventListener('click', () => flip('dark'));\n  document.getElementById('tw-compact').addEventListener('click', () => flip('compact'));\n  document.getElementById('tw-dark').addEventListener('keydown', (e) => { if (e.key===' '||e.key==='Enter') { e.preventDefault(); flip('dark'); } });\n  document.getElementById('tw-compact').addEventListener('keydown', (e) => { if (e.key===' '||e.key==='Enter') { e.preventDefault(); flip('compact'); } });\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
